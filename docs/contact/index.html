
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact the Author</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <style>
      /* HTML-side safety overrides so the rebuilt template works even with the old mobile CSS still present. */
      @media screen and (max-width: 768px) {
        .carousel-scene {
          touch-action: pan-y;
        }

        .carousel-group {
          position: relative;
          width: min(78vw, 280px);
          height: 360px;
          transform-style: preserve-3d;
          will-change: transform;
          animation: none !important;
        }

        .carousel-group .project-card {
          position: absolute;
          inset: 0;
          width: 100%;
          top: 0 !important;
          left: 0 !important;
          right: auto !important;
          bottom: auto !important;
          margin: 0 !important;
          opacity: 1 !important;
          animation: none !important;
          backface-visibility: hidden;
          transform-origin: center center;
          transition:
            transform 420ms cubic-bezier(0.22, 1, 0.36, 1),
            opacity 420ms ease,
            box-shadow 0.35s ease;
        }

        .carousel-group .project-card.is-front {
          box-shadow: 0 24px 50px rgba(0, 0, 0, 0.08);
        }
      }
    </style>
  </head>

  <body>
    <article id="markdown-content"><div><h1>Contact the Author</h1><p><a href="/static_site_generator/">< Back Home</a></p><p>All requests are possible through my Linkedin!</p><p><code>https://www.linkedin.com/in/akram-naser/</code></p></div></article>

    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <div class="detail-drawer" id="detail-drawer">
      <button class="drawer-close-btn" id="drawer-close" aria-label="Close project details">×</button>
      <div class="drawer-content" id="drawer-body"></div>
    </div>

    <script>
      (() => {
        const article = document.getElementById('markdown-content');
        const h1 = article ? article.querySelector('h1') : null;
        const isHomePage = h1 && /Akram Naser/i.test(h1.textContent || '');

        const drawer = document.getElementById('detail-drawer');
        const drawerBody = document.getElementById('drawer-body');
        const backdrop = document.getElementById('drawer-backdrop');
        const closeBtn = document.getElementById('drawer-close');

        let desktopScene = null;
        let mobileScene = null;
        let heroAnchor = null;

        function resetInterface() {
          drawer.classList.remove('open');
          backdrop.classList.remove('open');
          if (desktopScene) desktopScene.classList.remove('blur-background');
          if (mobileScene) mobileScene.classList.remove('blur-background');
          if (heroAnchor) heroAnchor.classList.remove('blur-background');
        }

        async function openDrawer(targetUrl) {
          if (!targetUrl) return;

          try {
            const response = await fetch(targetUrl);
            if (!response.ok) throw new Error('Fetch failed');

            const rawHtml = await response.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(rawHtml, 'text/html');
            const fetchedArticle = doc.querySelector('article');

            drawerBody.innerHTML = fetchedArticle ? fetchedArticle.outerHTML : rawHtml;
          } catch (err) {
            drawerBody.innerHTML = `<h2>Error</h2><p>Could not load: ${targetUrl}</p>`;
          }

          drawer.classList.add('open');
          backdrop.classList.add('open');
          if (desktopScene) desktopScene.classList.add('blur-background');
          if (mobileScene) mobileScene.classList.add('blur-background');
          if (heroAnchor) heroAnchor.classList.add('blur-background');
        }

        closeBtn && closeBtn.addEventListener('click', resetInterface);
        backdrop && backdrop.addEventListener('click', resetInterface);

        if (!isHomePage || !article) return;

        const wrapperDiv = article.querySelector('div') || article;
        article.style.display = 'none';

        heroAnchor = document.createElement('div');
        heroAnchor.className = 'hero-anchor-container';
        heroAnchor.id = 'hero-anchor';

        let heroCursor = wrapperDiv.firstElementChild;
        while (heroCursor && heroCursor.tagName !== 'H2') {
          const next = heroCursor.nextElementSibling;
          heroAnchor.appendChild(heroCursor);
          heroCursor = next;
        }

        desktopScene = document.createElement('div');
        desktopScene.className = 'parallax-scene';
        const desktopGallery = document.createElement('div');
        desktopGallery.className = 'parallax-gallery';
        desktopScene.appendChild(desktopGallery);

        mobileScene = document.createElement('div');
        mobileScene.className = 'carousel-scene';
        const mobileGroup = document.createElement('div');
        mobileGroup.className = 'carousel-group';
        mobileScene.appendChild(mobileGroup);

        const ul = article.querySelector('ul');
        const listItems = ul ? Array.from(ul.querySelectorAll('li')) : [];

        const desktopPlacements = [
          { top: '16%', left: '20%', transform: 'rotateY(20deg) translateZ(-100px)' },
          { top: '20%', right: '20%', transform: 'rotateY(-20deg) translateZ(-100px)' },
          { bottom: '16%', left: '24%', transform: 'rotateY(28deg) translateZ(-250px)' },
          { bottom: '24%', right: '24%', transform: 'rotateY(-28deg) translateZ(-250px)' },
          { top: '44%', left: '8%', transform: 'rotateY(18deg) translateZ(-180px)' },
          { top: '48%', right: '8%', transform: 'rotateY(-18deg) translateZ(-180px)' }
        ];

        function buildCardFromListItem(li, index, mode) {
          const card = document.createElement('div');
          card.className = 'project-card';
          card.id = mode === 'desktop' ? `card-${index + 1}` : `m-card-${index + 1}`;

          const img = li.querySelector('img');
          if (img) card.appendChild(img.cloneNode(true));

          const link = li.querySelector('a');
          const targetUrl = link ? link.getAttribute('href') || '' : '';
          card.dataset.targetUrl = targetUrl;

          if (link) {
            const h3 = document.createElement('h3');
            h3.textContent = link.textContent.trim();
            card.appendChild(h3);
          }

          const text = (li.textContent || '')
            .replace(link ? link.textContent : '', '')
            .replace(/^[\s-]+/, '')
            .trim();

          if (text) {
            const p = document.createElement('p');
            p.textContent = text;
            card.appendChild(p);
          }

          return card;
        }

        function applyDesktopPlacement(card, index) {
          const placement = desktopPlacements[index % desktopPlacements.length];
          Object.entries(placement).forEach(([key, value]) => {
            card.style[key] = value;
          });
        }

        let suppressClick = false;
        function bindCardClick(card) {
          card.addEventListener('click', (event) => {
            if (suppressClick) {
              event.preventDefault();
              return;
            }
            openDrawer(card.dataset.targetUrl);
          });
        }

        const mobileCards = [];

        listItems.forEach((li, index) => {
          const desktopCard = buildCardFromListItem(li, index, 'desktop');
          applyDesktopPlacement(desktopCard, index);
          bindCardClick(desktopCard);
          desktopGallery.appendChild(desktopCard);

          const mobileCard = buildCardFromListItem(li, index, 'mobile');
          bindCardClick(mobileCard);
          mobileGroup.appendChild(mobileCard);
          mobileCards.push(mobileCard);
        });

        document.body.appendChild(desktopScene);
        document.body.appendChild(mobileScene);
        document.body.appendChild(heroAnchor);

        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        function animateParallax() {
          currentX += (targetX - currentX) * 0.08;
          currentY += (targetY - currentY) * 0.08;
          desktopGallery.style.transform = `translateX(${currentX * 35}px) translateY(${currentY * 35}px) rotateX(${-currentY * 12}deg) rotateY(${currentX * 12}deg) scale(1.3)`;
          requestAnimationFrame(animateParallax);
        }

        window.addEventListener('mousemove', (e) => {
          targetX = e.clientX / window.innerWidth - 0.5;
          targetY = e.clientY / window.innerHeight - 0.5;
        });

        animateParallax();

        if (!mobileCards.length) return;

        const wheel = {
          rotation: 0,
          startX: 0,
          startRotation: 0,
          dragging: false,
          velocity: 0,
          lastX: 0,
          lastT: 0,
          step: 360 / mobileCards.length,
          radiusX: 120,
          radiusZ: 135,
          dragFactor: 0.38,
          snapMs: 420,
          frontThreshold: 0.72
        };

        function shortestSnap(angle, target) {
          const diff = (target - angle + 540) % 360 - 180;
          return angle + diff;
        }

        function setWheelTransitions(enabled) {
          mobileCards.forEach((card) => {
            card.style.transition = enabled
              ? `transform ${wheel.snapMs}ms cubic-bezier(0.22, 1, 0.36, 1), opacity ${wheel.snapMs}ms ease, box-shadow 0.35s ease`
              : 'none';
          });
        }

        function renderWheel() {
          mobileCards.forEach((card, index) => {
            const angleDeg = index * wheel.step + wheel.rotation;
            const angle = angleDeg * Math.PI / 180;

            const x = Math.sin(angle) * wheel.radiusX;
            const z = Math.cos(angle) * wheel.radiusZ;
            const depth = (z + wheel.radiusZ) / (wheel.radiusZ * 2);

            const scale = 0.84 + depth * 0.16;
            const opacity = 0.32 + depth * 0.68;
            const isFront = depth > wheel.frontThreshold;

            card.style.transform = `translate3d(${x}px, 0, ${z}px) scale(${scale})`;
            card.style.opacity = String(opacity);
            card.style.zIndex = String(100 + Math.round(z));
            card.style.pointerEvents = isFront ? 'auto' : 'none';
            card.classList.toggle('is-front', isFront);
          });
        }

        function snapWheel() {
          const nearestIndex = Math.round(-wheel.rotation / wheel.step);
          const target = -nearestIndex * wheel.step;
          wheel.rotation = shortestSnap(wheel.rotation, target);
          setWheelTransitions(true);
          renderWheel();
          window.setTimeout(() => { suppressClick = false; }, 80);
        }

        function getPointerX(event) {
          if (event.touches && event.touches.length) return event.touches[0].clientX;
          if (event.changedTouches && event.changedTouches.length) return event.changedTouches[0].clientX;
          return event.clientX;
        }

        function startWheel(event) {
          wheel.dragging = true;
          suppressClick = false;
          wheel.startX = getPointerX(event);
          wheel.startRotation = wheel.rotation;
          wheel.lastX = wheel.startX;
          wheel.lastT = performance.now();
          wheel.velocity = 0;
          setWheelTransitions(false);
        }

        function moveWheel(event) {
          if (!wheel.dragging) return;

          const x = getPointerX(event);
          const now = performance.now();
          const delta = x - wheel.startX;

          if (Math.abs(delta) > 8) suppressClick = true;

          wheel.rotation = wheel.startRotation + delta * wheel.dragFactor;

          const dt = now - wheel.lastT;
          if (dt > 0) {
            wheel.velocity = (x - wheel.lastX) / dt;
            wheel.lastX = x;
            wheel.lastT = now;
          }

          renderWheel();
        }

        function endWheel() {
          if (!wheel.dragging) return;
          wheel.dragging = false;
          wheel.rotation += wheel.velocity * 22;
          snapWheel();
        }

        mobileScene.addEventListener('touchstart', startWheel, { passive: true });
        mobileScene.addEventListener('touchmove', moveWheel, { passive: true });
        mobileScene.addEventListener('touchend', endWheel);
        mobileScene.addEventListener('touchcancel', endWheel);

        mobileScene.addEventListener('pointerdown', startWheel);
        mobileScene.addEventListener('pointermove', moveWheel);
        mobileScene.addEventListener('pointerup', endWheel);
        mobileScene.addEventListener('pointercancel', endWheel);
        mobileScene.addEventListener('pointerleave', endWheel);

        window.addEventListener('resize', renderWheel);
        renderWheel();
      })();
    </script>
  </body>
</html>
